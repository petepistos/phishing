<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting...</title>
<style>
  body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex;
         align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .msg { text-align: center; color: #888; font-size: 14px; }
  .spinner { width: 32px; height: 32px; border: 3px solid #ddd;
             border-top-color: #1a2a4a; border-radius: 50%;
             animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="msg">
  <div class="spinner"></div>
  <p>Loading security training...</p>
</div>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var token      = params.get('t') || '';
  var campaignId = params.get('c') || '';
  var pipedream  = params.get('p') || '';
  var landingPage = 'index.html';
  if (pipedream && token) {
    var payload = JSON.stringify({
      token: token, campaignId: campaignId,
      timestamp: new Date().toISOString(),
      userAgent: navigator.userAgent, referrer: document.referrer
    });
    fetch(decodeURIComponent(pipedream), {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: payload, mode: 'no-cors'
    }).catch(function(){});
    if (navigator.sendBeacon) {
      navigator.sendBeacon(decodeURIComponent(pipedream),
        new Blob([payload], { type: 'application/json' }));
    }
  }
  setTimeout(function() { window.location.replace(landingPage); }, 400);
})();
</script>
</body>
</html>
